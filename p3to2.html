    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        :root { 
            --bg: #f8fafc; 
            --text: #0f172a; 
            --accent: #ff8c00; 
            --card: #ffffff; 
            --border: rgba(0,0,0,0.06); 
        }

        [data-theme="dark"] {
            --bg: #020617;
            --text: #f8fafc;
            --card: #0f172a;
            --border: rgba(255,255,255,0.1);
        }

        /* Sinkronisasi Warna Aksen Dinamis */
        h1 span, .counter-badge, .back-btn:hover { color: var(--accent) !important; }
        .main-dl-all:hover, .single-dl-btn:hover { background-color: var(--accent) !important; color: white !important; border-color: var(--accent) !important; }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; transition: background 0.3s, color 0.3s; }
        body { background: var(--bg); color: var(--text); padding: 40px 8%; min-height: 100vh; }
        
        .header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 50px; flex-wrap: wrap; gap: 20px; }
        .back-btn { text-decoration: none; color: var(--text); font-weight: 800; display: flex; align-items: center; gap: 10px; font-size: 0.8rem; letter-spacing: 1px; margin-bottom: 10px; }
        
        h1 { font-size: 3rem; font-weight: 800; letter-spacing: -3px; }
        .counter-badge { display: inline-block; padding: 5px 15px; background: rgba(125,125,125,0.1); border-radius: 10px; font-size: 0.8rem; font-weight: 700; margin-top: 10px; }

        .photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; }
        .photo-card { background: var(--card); border-radius: 25px; overflow: hidden; border: 1px solid var(--border); transition: 0.4s ease; display: flex; flex-direction: column; }
        .photo-card:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        
        .img-container { width: 100%; height: 280px; overflow: hidden; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; }

        .download-area { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; background: var(--card); border-top: 1px solid var(--border); }
        .file-info { font-size: 0.75rem; font-weight: 700; color: #94a3b8; text-transform: uppercase; }

        .single-dl-btn { width: 40px; height: 40px; border-radius: 12px; background: var(--bg); color: var(--text); display: flex; align-items: center; justify-content: center; text-decoration: none; border: 1px solid var(--border); transition: 0.3s; }
        .main-dl-all { background: var(--text); color: var(--bg); border: none; padding: 15px 30px; border-radius: 15px; font-weight: 800; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: 0.3s; }
    </style>
</head>

    <script>
        function applySavedSettings() {
            const savedTheme = localStorage.getItem('p3to-theme') || 'light';
            document.body.setAttribute('data-theme', savedTheme);

            const savedColor = localStorage.getItem('p3to-accent-color');
            if (savedColor) document.documentElement.style.setProperty('--accent', savedColor);
        }

        function updateImageCount() {
            const total = document.querySelectorAll('.photo-card').length;
            document.getElementById('imgCounter').innerHTML = `<i class="fa-solid fa-camera"></i> Terdeteksi: ${total} Gambar`;
        }

        window.addEventListener('DOMContentLoaded', () => {
            applySavedSettings();
            updateImageCount();
        });

        async function downloadAllImages() {
            const images = document.querySelectorAll('.photo-card img');
            const btn = document.querySelector('.main-dl-all');
            const originalHTML = btn.innerHTML;
            
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Processing...';
            btn.style.pointerEvents = 'none';
            
            for (let i = 0; i < images.length; i++) {
                await new Promise(r => setTimeout(r, 600)); 
                forceDownload(images[i].src, `P3TO_SEKTOR2_${i+1}.jpg`);
            }
            
            btn.innerHTML = '<i class="fa-solid fa-check"></i> Selesai!';
            setTimeout(() => { 
                btn.innerHTML = originalHTML; 
                btn.style.pointerEvents = 'all';
            }, 3000);
        }

        function triggerDownload(element, url, name) {
            event.preventDefault(); 
            forceDownload(url, name);
        }

        function forceDownload(url, name) {
            fetch(url).then(resp => resp.blob()).then(blob => {
                const urlBlob = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = urlBlob; a.download = name;
                document.body.appendChild(a); a.click();
                window.URL.revokeObjectURL(urlBlob); document.body.removeChild(a);
            }).catch(() => console.error('Gagal download: ' + url));
        }
    </script>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P3TO DASHBOARD</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        :root {
            --bg: #f8fafc;
            --card: rgba(255, 255, 255, 0.7);
            --text: #0f172a;
            --text-muted: #64748b;
            --accent: #ff8c00; 
            --border: rgba(0,0,0,0.06);
            --shadow: rgba(0,0,0,0.05);
        }

        [data-theme="dark"] {
            --bg: #020617;
            --card: rgba(15, 23, 42, 0.7);
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255,255,255,0.08);
            --shadow: rgba(0,0,0,0.3);
        }

        /* Sinkronisasi Warna Aksen ke Elemen Spesifik */
        .logo span, h1 span, .badge, .sub-btn:hover, .main-btn:hover, .download-btn {
            background-color: var(--accent) !important;
            color: white !important;
        }
        .logo span, .section-title span { background: none !important; color: var(--accent) !important; }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--text); min-height: 100vh; transition: background 0.5s ease; padding-bottom: 100px; overflow-x: hidden; }

        .blob { position: fixed; width: 400px; height: 400px; background: var(--accent); opacity: 0.1; filter: blur(80px); border-radius: 50%; z-index: -1; animation: move 15s infinite alternate; }
        @keyframes move { from { transform: translate(-10%, -10%); } to { transform: translate(60%, 40%); } }

        nav { padding: 40px 8%; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.8rem; font-weight: 900; letter-spacing: -2px; }
        .logo span { color: var(--accent); }

        .settings-container { position: fixed; top: 30px; right: 30px; z-index: 1000; }
        .gear-btn { width: 55px; height: 55px; background: var(--card); border: 1px solid var(--border); backdrop-filter: blur(15px); border-radius: 20px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 1.3rem; box-shadow: 0 10px 30px var(--shadow); transition: 0.3s; }
        .gear-btn:hover { transform: rotate(90deg); color: var(--accent); }

        .settings-panel { position: absolute; top: 70px; right: 0; width: 280px; background: var(--card); backdrop-filter: blur(25px); border: 1px solid var(--border); border-radius: 30px; padding: 25px; box-shadow: 0 30px 60px var(--shadow); opacity: 0; pointer-events: none; transform: scale(0.9) translateY(-20px); transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .settings-panel.active { opacity: 1; pointer-events: all; transform: scale(1) translateY(0); }

        .section-label { font-size: 0.7rem; font-weight: 800; color: var(--text-muted); margin-bottom: 12px; display: block; text-transform: uppercase; letter-spacing: 1px; }
        .theme-switch { width: 100%; padding: 14px; background: rgba(125,125,125,0.1); border-radius: 15px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; margin-bottom: 25px; font-weight: 700; }
        
        .color-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .color-dot { height: 40px; border-radius: 12px; cursor: pointer; border: 2px solid transparent; transition: 0.2s; }
        .color-dot.active { border-color: var(--text); transform: scale(1.1); }

        .main-hero { max-width: 1200px; margin: 20px auto; padding: 0 8%; }
        .badge { display: inline-block; padding: 8px 20px; background: var(--accent); color: white; border-radius: 100px; font-size: 0.75rem; font-weight: 800; margin-bottom: 25px; }
        h1 { font-size: 4.5rem; font-weight: 800; letter-spacing: -4px; line-height: 0.9; margin-bottom: 45px; }

        .gallery-card { background: var(--card); backdrop-filter: blur(30px); padding: 50px; border-radius: 50px; box-shadow: 0 50px 100px var(--shadow); border: 1px solid rgba(255,255,255,0.2); }
        .action-area { margin-top: 30px; display: flex; flex-direction: column; gap: 20px; }
        
        .main-btn { display: inline-flex; align-items: center; justify-content: center; gap: 12px; padding: 20px 45px; background: var(--text); color: var(--bg); border-radius: 25px; font-weight: 800; font-size: 1.1rem; cursor: pointer; border: none; transition: 0.4s; text-decoration: none; }
        .main-btn:hover { transform: translateY(-5px); background: var(--accent); color: white; }

        .sub-gallery-options { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; max-height: 0; opacity: 0; overflow: hidden; transition: 0.5s ease; }
        .sub-gallery-options.show { max-height: 200px; opacity: 1; margin-top: 10px; }

        .sub-btn { padding: 18px; background: var(--card); border: 1px solid var(--border); border-radius: 20px; color: var(--text); font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.3s; text-decoration: none; }
        .sub-btn:hover { background: var(--accent); color: white; transform: translateY(-3px); }
    </style>
</head>
<body data-theme="light">
    <div class="blob"></div>

    <div class="settings-container">
        <div class="gear-btn" onclick="toggleSettings()"><i class="fa-solid fa-gear"></i></div>
        <div class="settings-panel" id="panel">
            <span class="section-label">Mode Visual</span>
            <div class="theme-switch" onclick="toggleTheme()">
                <span id="themeLabel">Light Mode</span>
                <i class="fa-solid fa-moon" id="themeIcon"></i>
            </div>
            <span class="section-label">Aksen Warna</span>
            <div class="color-grid">
                <div class="color-dot" style="background: #ff8c00;" onclick="setAccent('#ff8c00', this)"></div>
                <div class="color-dot" style="background: #0070f3;" onclick="setAccent('#0070f3', this)"></div>
                <div class="color-dot" style="background: #ff4757;" onclick="setAccent('#ff4757', this)"></div>
                <div class="color-dot" style="background: #00d084;" onclick="setAccent('#00d084', this)"></div>
                <div class="color-dot" style="background: #febd2d;" onclick="setAccent('#febd2d', this)"></div>
                <div class="color-dot" style="background: #ff4dff;" onclick="setAccent('#ff4dff', this)"></div>
            </div>
        </div>
    </div>

    <nav><div class="logo">P3TO<span>.</span></div></nav>

    <main class="main-hero">
        <div class="badge">Professional Gallery System</div>
        <h1>Dashboard<br>Gallery<br>System.</h1>

        <div class="gallery-card">
            <h2>P3TO DASHBOARD</h2>
            <p>Akses Gallery P3TO Melalui Button Dibawah</p>
            
            <div class="action-area">
                <button class="main-btn" onclick="toggleGalleryOptions()">
                    Open Gallery <i class="fa-solid fa-chevron-down" id="chevron" style="transition:0.3s"></i>
                </button>

                <div class="sub-gallery-options" id="subOptions">
                    <a href="p3to1.html" class="sub-btn"><i class="fa-solid fa-folder-open"></i> P3TO 1</a>
                    <a href="p3to2.html" class="sub-btn"><i class="fa-solid fa-lock"></i> P3TO 2</a>
                </div>

                <a href="index.html" style="text-align:center; color:#ff4757; text-decoration:none; font-weight:800; font-size:0.9rem; margin-top:10px;">Keluar Protokol</a>
            </div>
        </div>
    </main>

    <script>
        function toggleSettings() { document.getElementById('panel').classList.toggle('active'); }

        function toggleGalleryOptions() {
            const options = document.getElementById('subOptions');
            const chevron = document.getElementById('chevron');
            options.classList.toggle('show');
            chevron.style.transform = options.classList.contains('show') ? 'rotate(180deg)' : 'rotate(0deg)';
        }

        function setAccent(color, element) {
            document.documentElement.style.setProperty('--accent', color);
            localStorage.setItem('p3to-accent-color', color);
            
            document.querySelectorAll('.color-dot').forEach(dot => dot.classList.remove('active'));
            if(element) element.classList.add('active');
        }

        function toggleTheme() {
            const body = document.body;
            const newTheme = body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            body.setAttribute('data-theme', newTheme);
            localStorage.setItem('p3to-theme', newTheme);
            updateThemeUI(newTheme);
        }

        function updateThemeUI(theme) {
            document.getElementById('themeLabel').innerText = theme === 'dark' ? 'Dark Mode' : 'Light Mode';
            document.getElementById('themeIcon').className = theme === 'dark' ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
        }

        window.addEventListener('DOMContentLoaded', () => {
            const savedTheme = localStorage.getItem('p3to-theme') || 'light';
            document.body.setAttribute('data-theme', savedTheme);
            updateThemeUI(savedTheme);

            const savedColor = localStorage.getItem('p3to-accent-color') || '#ff8c00';
            setAccent(savedColor, null);
            
            // Tandai dot yang aktif
            document.querySelectorAll('.color-dot').forEach(dot => {
                const bg = dot.style.backgroundColor;
                if (rgbToHex(bg) === savedColor.toLowerCase()) dot.classList.add('active');
            });
        });

        function rgbToHex(rgb) {
            if(!rgb) return "";
            let a = rgb.split("(")[1].split(")")[0].split(",");
            return "#" + a.map(x => ("0" + parseInt(x).toString(16)).slice(-2)).join("");
        }
    </script>
</body>
</html>
